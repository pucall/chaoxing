name: 刷课

on: 
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"  # UTC时间0点（北京时间8点）
    
jobs: 
  Start:
    runs-on: ubuntu-latest
    steps:
      # 必须第一步克隆代码
      - name: 拷贝代码
        uses: actions/checkout@v3

      # 时段校验（北京时间）
      - name: 执行时段检查
        id: time-check
        run: |
          export TZ=Asia/Shanghai  # 强制北京时区
          current_hour=$(date +'%H')  # 获取小时(24)
          current_min=$(date +'%M')   # 获取分钟

          # 时段判断逻辑（硬性限制）
          if [ $current_hour -lt 8 ]; then
            echo "::error::❌ 当前时间 $(date +'%H:%M')，早于8点禁止执行"
            exit 1
          elif [ $current_hour -ge 11 ]; then
            echo "::error::❌ 当前时间 $(date +'%H:%M')，超过11点禁止执行"
            exit 1
          else
            # 计算剩余秒数（正确单位）
            remain_seconds=$(( (11*60 + 0 - (current_hour*60 + current_min)) *60 )) 
            echo "剩余执行时间：$((remain_seconds/60)) 分钟"
            echo "remain_seconds=$remain_seconds" >> $GITHUB_OUTPUT
          fi
            
      # 以下步骤仅在通过时段检查时执行 ▼▼▼ 
      - name: 设置python环境
        if: ${{ success() }}
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖包
        if: ${{ success() }}
        run: pip install -r ./requirements.txt


      - name: 执行刷课任务
        if: ${{ success() }}
        run: |
          timeout --preserve-status ${{ steps.time-check.outputs.remain_seconds }} \
            python main.py \
            -u "19011473320" \    # 账号明文
            -p "856923741xxt" \   # 密码明文
            -l "252119810"        # 课程ID
