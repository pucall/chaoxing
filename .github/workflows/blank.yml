name: 固定时间课程任务

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"  # UTC时间0点（北京时间8点）

jobs:
  main-task:
    runs-on: ubuntu-latest
    steps:
      # --------------------- 新增的关键步骤 ---------------------
      - name: Checkout code
        uses: actions/checkout@v3  # 必须添加的代码检出步骤

      # --------------------- 原有时区检测逻辑（仅修正输出格式）---------------------
      - name: 设置时区并计算剩余时间
        id: time-check
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          current_hour=$(date +'%-H')
          current_min=$(date +'%-M')
          
          if [ $current_hour -lt 8 ]; then
            echo "remain_sec=0" >> $GITHUB_OUTPUT  # 统一变量名
            echo "::error::执行时段未到（8-11点）"
            exit 1
          elif [ $current_hour -ge 11 ]; then
            echo "remain_sec=0" >> $GITHUB_OUTPUT  # 统一变量名
            echo "::error::执行时段已结束（8-11点）"
            exit 1
          else
            remain_min=$(( (11 - current_hour)*60 - current_min ))
            remain_sec=$(( remain_min * 60 ))
            echo "当前时间：$(date +'%H:%M')"
            echo "remain_sec=$remain_sec" >> $GITHUB_OUTPUT  # 英文变量名
          fi

      # --------------------- 原有执行逻辑保持不变 ---------------------
      - name: 执行核心任务
        if: ${{ success() }}
        run: |
          /usr/bin/timeout --preserve-status ${{ steps.time-check.outputs.remain_sec }} \
            python main.py \
            -u 19011473320 \
            -p 856923741xxt \
            -l 252119810
          echo "任务终止时间：$(date +'%H:%M:%S')"
